<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 数据接收与展示</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            border-bottom: 2px solid #eaecef;
            padding-bottom: 10px;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .status {
            margin-left: 15px;
            font-size: 14px;
            color: #666;
        }
        .error-msg {
            color: #e74c3c;
            font-weight: bold;
        }
        .success-msg {
            color: #2ecc71;
        }
        pre {
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>API 数据终端</h1>
    
    <div class="controls">
        <button id="fetchBtn" onclick="fetchData()">获取/刷新数据</button>
        <span id="statusText" class="status">准备就绪...</span>
    </div>

    <h3>接收到的数据：</h3>
    <pre id="dataDisplay">点击上方按钮获取数据，或等待自动加载...</pre>
</div>

<script>
    // 你的 API 地址（包含 Token）
    const apiUrl = "http://47.76.194.115/api/record?token=ceje0askmo8xf6qdrq9u1e2os2degivag9i9";

    // 核心的获取数据函数
    async function fetchData() {
        const btn = document.getElementById('fetchBtn');
        const display = document.getElementById('dataDisplay');
        const statusText = document.getElementById('statusText');

        // 更新 UI 状态
        btn.disabled = true;
        statusText.textContent = "正在请求数据...";
        statusText.className = "status";
        display.textContent = "加载中...";

        try {
            // 发起 HTTP GET 请求
            const response = await fetch(apiUrl);
            
            // 检查 HTTP 状态码（比如 200 表示成功，404 表示找不到等）
            if (!response.ok) {
                throw new Error(`请求失败，状态码: ${response.status}`);
            }

            // 解析 JSON 格式的数据
            const data = await response.json();
            
            // 将 JSON 数据格式化并显示在页面上（缩进为 4 个空格）
            display.textContent = JSON.stringify(data, null, 4);
            
            statusText.textContent = `获取成功！更新时间: ${new Date().toLocaleTimeString()}`;
            statusText.className = "status success-msg";

        } catch (error) {
            // 错误处理
            console.error("获取数据时出错:", error);
            display.textContent = `发生错误：\n${error.message}\n\n请按 F12 打开开发者工具查看 Console 中的详细错误信息。`;
            statusText.textContent = "获取失败";
            statusText.className = "status error-msg";
        } finally {
            // 恢复按钮状态
            btn.disabled = false;
        }
    }

    // 页面加载完成后自动请求一次数据
    window.onload = () => {
        fetchData();
    };
</script>

</body>
</html>
