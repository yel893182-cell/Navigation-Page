<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小秋导航页</title>
    <style>
        /* 基础样式：高级动态极光渐变背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            /* 柔和深邃的极光渐变色 */
            background: linear-gradient(125deg, #020111 0%, #020111 20%, #191c30 40%, #2e283b 50%, #191c30 60%, #020111 80%, #020111 100%);
            background-size: 400% 400%;
            animation: auroraBG 20s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden; /* 防止极光溢出 */
        }

        /* 极光流动动画 */
        @keyframes auroraBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 增加一层淡淡的极光流光效果 (可选，增加层次感) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(0, 255, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        /* 高级毛玻璃容器 */
        .container {
            background: rgba(255, 255, 255, 0.06); /* 更透明 */
            backdrop-filter: blur(25px); /* 更强磨砂感 */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* 更细边框 */
            border-radius: 30px; /* 更圆润 */
            padding: 50px 30px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); /* 更深阴影 */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
        }

        /* 头像：圆形，精细边框 */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.4);
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        
        .avatar:hover {
            transform: scale(1.08) rotate(3deg);
        }

        /* 标题和简介 */
        h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        p.bio {
            font-size: 0.95rem;
            opacity: 0.8;
            margin: 10px 0 35px 0;
            color: #ddd;
        }

        /* 链接列表 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* 按钮：更高级的透明感与悬停发光 */
        .link-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 1.05rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            /* 增加呼应头像红眼的霓虹发光效果 */
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.3);
            transform: translateY(-3px);
            border-color: rgba(255, 100, 100, 0.3);
        }

        /* 底部版权 */
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.6;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="snow-container"></div> <div class="container">
        <header>

            <h1>小秋导航页</h1>
